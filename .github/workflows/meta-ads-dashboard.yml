name: Atualizar Meta Ads Dashboard

on:
  # Agendamento pausado — rodar manualmente quando necessário
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Buscar dados da Meta Ads API (todos os períodos)
        run: node skills/meta-ads/scripts/fetch-multi.js --output /tmp/dashboard-data.json
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}

      - name: Gerar dashboard HTML
        run: |
          mkdir -p /tmp/www
          node skills/meta-ads/scripts/generate-dashboard.js \
            --input /tmp/dashboard-data.json \
            --output /tmp/www/index.html

      - name: Deploy no GitHub Pages (branch gh-pages)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: /tmp/www
          publish_branch: gh-pages
          commit_message: "chore: update dashboard ${{ github.run_id }}"
